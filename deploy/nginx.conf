server {
    listen 80;
    listen [::]:80;
    server_name SEU_DOMINIO;

    # Redireciona tudo para HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name SEU_DOMINIO;

    # Certificados gerados pelo Certbot (preenchido automaticamente)
    ssl_certificate     /etc/letsencrypt/live/SEU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/SEU_DOMINIO/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend — arquivos estáticos do build do Vite
    root /opt/diario/frontend/dist;
    index index.html;

    # SPA: redireciona todas as rotas para o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend — proxy para o Fastify na porta 3001
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Upload de fotos (aumenta limite)
        client_max_body_size 20M;
    }

    # Cache para assets estáticos do frontend
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker nunca deve ser cacheado
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}
